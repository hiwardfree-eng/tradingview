{% extends "base.html" %}
{% block content %}
<section class="section" style="padding-top:100px;max-width:420px;margin:0 auto">
  <h2 class="section-title" style="font-size:1.3rem">⚡ ACCESO ADMIN</h2>
  <p class="section-sub">INGRESÁ TUS CREDENCIALES</p>
  {% if error %}<div style="background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.15);border-radius:12px;padding:14px 18px;color:#ef4444;font-size:.8rem;margin-bottom:18px">{{ error }}</div>{% endif %}
  <div class="glass" style="padding:32px;border-color:rgba(34,211,238,0.1)">
    <form method="POST">
      <div style="margin-bottom:16px">
        <label style="font-size:.72rem;color:#475569;display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em">Usuario</label>
        <input type="text" name="user" placeholder="admin" autocomplete="username" required>
      </div>
      <div style="margin-bottom:24px">
        <label style="font-size:.72rem;color:#475569;display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em">Contraseña</label>
        <input type="password" name="pass" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px">Ingresar</button>
    </form>
  </div>
  <div style="text-align:center;margin-top:18px"><a href="/" class="btn btn-outline" style="padding:8px 20px">← Volver</a></div>
</section>
{% endblock %}
