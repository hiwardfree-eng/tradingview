{% extends "base.html" %}
{% block content %}
<section class="section" style="padding-top:80px;max-width:420px;margin:0 auto">
  <h2 class="section-title">ACCESO ADMIN</h2>
  <p class="section-sub">INGRESÁ TUS CREDENCIALES</p>
  {% if error %}<div style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:10px;padding:12px 16px;color:#ef4444;font-size:.82rem;margin-bottom:16px">{{ error }}</div>{% endif %}
  <div class="glass" style="padding:28px;border-color:rgba(34,211,238,0.15)">
    <form method="POST">
      <div style="margin-bottom:14px">
        <label style="font-size:.78rem;color:#64748b;display:block;margin-bottom:5px">Usuario</label>
        <input type="text" name="user" placeholder="admin" autocomplete="username" required>
      </div>
      <div style="margin-bottom:20px">
        <label style="font-size:.78rem;color:#64748b;display:block;margin-bottom:5px">Contraseña</label>
        <input type="password" name="pass" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Ingresar</button>
    </form>
  </div>
  <div style="text-align:center;margin-top:16px"><a href="/" class="btn btn-outline">← Volver</a></div>
</section>
{% endblock %}
