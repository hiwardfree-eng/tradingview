<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TradingView Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#0a0b0f;color:#e2e8f0;font-family:'Inter',system-ui,sans-serif;min-height:100vh}
body{display:flex;flex-direction:column}
a{color:#22d3ee;text-decoration:none}
nav{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(15,17,23,0.95);border-bottom:1px solid rgba(34,211,238,0.12);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
.nav-logo{font-family:'JetBrains Mono',monospace;font-size:1.05rem;font-weight:600;color:#22d3ee;display:flex;align-items:center;gap:8px}
.nav-logo svg{width:22px;height:22px}
.nav-links{display:flex;gap:6px;align-items:center}
.nav-links a{padding:7px 16px;border-radius:8px;font-size:.82rem;font-weight:500;color:#94a3b8;transition:.2s}
.nav-links a:hover{color:#22d3ee;background:rgba(34,211,238,0.08)}
.nav-links a.active{color:#22d3ee;background:rgba(34,211,238,0.12)}
.btn{padding:9px 20px;border-radius:10px;font-size:.82rem;font-weight:600;border:none;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:7px}
.btn-primary{background:linear-gradient(135deg,#0891b2,#06b6d4);color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(6,182,212,0.3)}
.btn-outline{background:rgba(34,211,238,0.08);color:#22d3ee;border:1px solid rgba(34,211,238,0.2)}
.btn-outline:hover{background:rgba(34,211,238,0.15)}
.btn-danger{background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.25)}
.btn-danger:hover{background:rgba(239,68,68,0.25)}
.btn-success{background:rgba(34,197,94,0.15);color:#22c55e;border:1px solid rgba(34,197,94,0.25)}
.container{max-width:1200px;margin:0 auto;padding:24px;flex:1}
.glass{background:rgba(15,17,23,0.6);border:1px solid rgba(34,211,238,0.1);border-radius:16px;backdrop-filter:blur(12px)}
.section{padding:60px 24px;text-align:center}
.section-title{font-size:1.6rem;font-weight:800;margin-bottom:8px;background:linear-gradient(135deg,#22d3ee,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.section-sub{font-size:.82rem;color:#64748b;letter-spacing:.12em;text-transform:uppercase;margin-bottom:32px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-top:24px}
.card{background:rgba(15,17,23,0.8);border:1px solid rgba(34,211,238,0.08);border-radius:14px;padding:28px 22px;text-align:center;transition:.3s}
.card:hover{border-color:rgba(34,211,238,0.25);transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,0.3)}
.card-icon{font-size:2.2rem;margin-bottom:12px}
.card h3{font-size:.95rem;font-weight:700;color:#e2e8f0;margin-bottom:8px}
.card p{font-size:.8rem;color:#64748b;line-height:1.6}
input,select{background:rgba(15,17,23,0.9);border:1px solid rgba(34,211,238,0.15);border-radius:10px;padding:10px 14px;color:#e2e8f0;font-size:.85rem;font-family:'JetBrains Mono',monospace;width:100%;transition:.2s}
input:focus,select:focus{outline:none;border-color:#22d3ee;box-shadow:0 0 0 3px rgba(34,211,238,0.12)}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{text-align:left;padding:12px 14px;color:#64748b;font-weight:600;text-transform:uppercase;font-size:.7rem;letter-spacing:.08em;border-bottom:1px solid rgba(34,211,238,0.08)}
td{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,0.04)}
tr:hover td{background:rgba(34,211,238,0.03)}
.tag{padding:3px 10px;border-radius:99px;font-size:.72rem;font-weight:600}
.tag-active{background:rgba(34,197,94,0.12);color:#22c55e}
.tag-inactive{background:rgba(100,116,139,0.12);color:#64748b}
.tag-admin{background:rgba(251,191,36,0.12);color:#fbbf24}
footer{padding:24px;text-align:center;font-size:.72rem;color:#334155;border-top:1px solid rgba(34,211,238,0.06)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#0a0b0f}
::-webkit-scrollbar-thumb{background:rgba(34,211,238,0.2);border-radius:99px}
@media(max-width:640px){nav{padding:12px 16px;flex-wrap:wrap;gap:8px}.nav-links{flex-wrap:wrap}.container{padding:16px}}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
    TradingView
  </a>
  <div class="nav-links">
    <a href="/" class="{% if request.path == '/' %}active{% endif %}">Inicio</a>
    <a href="/terminal" class="{% if request.path == '/terminal' %}active{% endif %}">Terminal</a>
    <a href="/downloads" class="{% if request.path == '/downloads' %}active{% endif %}">Descargas</a>
    <a href="/admin" class="{% if request.path == '/admin' %}active{% endif %}">Admin</a>
  </div>
</nav>
<div class="container">{% block content %}{% endblock %}</div>
<footer>TradingView Terminal Platform &mdash; v1.0</footer>
<script>
{% block scripts %}{% endblock %}
</script>
</body>
</html>
