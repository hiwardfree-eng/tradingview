<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TradingView Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#07080d;color:#e2e8f0;font-family:'Inter',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
body{display:flex;flex-direction:column;position:relative}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at 50% 0%, rgba(34,211,238,0.04) 0%, transparent 60%),radial-gradient(ellipse at 80% 20%, rgba(139,92,246,0.03) 0%, transparent 50%);z-index:0;pointer-events:none}
a{color:#22d3ee;text-decoration:none;transition:.3s}
a:hover{color:#67e8f9}

/* Lightning Canvas */
#storm-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;opacity:.6}

/* Nav */
nav{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;background:rgba(7,8,13,0.92);border-bottom:1px solid rgba(34,211,238,0.08);backdrop-filter:blur(16px);position:sticky;top:0;z-index:100}
.nav-logo{font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:700;color:#22d3ee;display:flex;align-items:center;gap:10px;letter-spacing:.04em}
.nav-logo svg{width:20px;height:20px;filter:drop-shadow(0 0 8px rgba(34,211,238,0.4))}
.nav-links{display:flex;gap:4px;align-items:center}
.nav-links a{padding:8px 18px;border-radius:10px;font-size:.8rem;font-weight:500;color:#64748b;transition:.3s;position:relative}
.nav-links a:hover{color:#22d3ee;background:rgba(34,211,238,0.06);text-shadow:0 0 20px rgba(34,211,238,0.2)}
.nav-links a.active{color:#22d3ee;background:rgba(34,211,238,0.1);text-shadow:0 0 20px rgba(34,211,238,0.3)}
.nav-links a.active::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:20px;height:2px;background:#22d3ee;border-radius:99px;box-shadow:0 0 10px rgba(34,211,238,0.5)}

/* Buttons */
.btn{padding:10px 22px;border-radius:12px;font-size:.8rem;font-weight:600;border:none;cursor:pointer;transition:.3s;display:inline-flex;align-items:center;gap:8px;position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent);transition:.5s}
.btn:hover::before{left:100%}
.btn-primary{background:linear-gradient(135deg,#0891b2,#06b6d4);color:#fff;box-shadow:0 0 20px rgba(6,182,212,0.2)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 0 30px rgba(6,182,212,0.4)}
.btn-outline{background:rgba(34,211,238,0.06);color:#22d3ee;border:1px solid rgba(34,211,238,0.15);box-shadow:0 0 15px rgba(34,211,238,0.05)}
.btn-outline:hover{background:rgba(34,211,238,0.12);border-color:rgba(34,211,238,0.3);box-shadow:0 0 25px rgba(34,211,238,0.15)}
.btn-danger{background:rgba(239,68,68,0.1);color:#ef4444;border:1px solid rgba(239,68,68,0.2);box-shadow:0 0 15px rgba(239,68,68,0.05)}
.btn-danger:hover{background:rgba(239,68,68,0.2);box-shadow:0 0 25px rgba(239,68,68,0.15)}
.btn-success{background:rgba(34,197,94,0.1);color:#22c55e;border:1px solid rgba(34,197,94,0.2);box-shadow:0 0 15px rgba(34,197,94,0.05)}

.container{max-width:1200px;margin:0 auto;padding:28px;flex:1;position:relative;z-index:10}

/* Glass morphism */
.glass{background:rgba(10,12,20,0.7);border:1px solid rgba(34,211,238,0.08);border-radius:18px;backdrop-filter:blur(16px);box-shadow:0 8px 32px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.03);transition:.3s}
.glass:hover{border-color:rgba(34,211,238,0.15);box-shadow:0 8px 40px rgba(0,0,0,0.4),0 0 30px rgba(34,211,238,0.03)}

.section{padding:70px 28px;text-align:center;position:relative}
.section::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:200px;height:1px;background:linear-gradient(90deg,transparent,rgba(34,211,238,0.3),transparent)}
.section-title{font-family:'Orbitron',sans-serif;font-size:1.8rem;font-weight:800;margin-bottom:10px;background:linear-gradient(135deg,#22d3ee,#06b6d4,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.02em;text-shadow:none;filter:drop-shadow(0 0 30px rgba(34,211,238,0.15))}
.section-sub{font-size:.75rem;color:#475569;letter-spacing:.18em;text-transform:uppercase;margin-bottom:36px;font-weight:400}

/* Cards storm */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:18px;margin-top:28px}
.card{background:rgba(10,12,20,0.8);border:1px solid rgba(34,211,238,0.06);border-radius:16px;padding:32px 24px;text-align:center;transition:.4s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 50% 0%, rgba(34,211,238,0.03) 0%, transparent 50%);opacity:0;transition:.6s}
.card:hover::before{opacity:1}
.card:hover{border-color:rgba(34,211,238,0.2);transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,0.4),0 0 30px rgba(34,211,238,0.05)}
.card-icon{font-size:2.4rem;margin-bottom:14px;filter:drop-shadow(0 0 12px rgba(34,211,238,0.15))}
.card h3{font-family:'Orbitron',sans-serif;font-size:.85rem;font-weight:700;color:#e2e8f0;margin-bottom:10px;letter-spacing:.03em}
.card p{font-size:.78rem;color:#64748b;line-height:1.7;font-weight:300}

input,select{background:rgba(7,8,13,0.95);border:1px solid rgba(34,211,238,0.12);border-radius:12px;padding:11px 16px;color:#e2e8f0;font-size:.82rem;font-family:'JetBrains Mono',monospace;width:100%;transition:.3s}
input:focus,select:focus{outline:none;border-color:#22d3ee;box-shadow:0 0 0 3px rgba(34,211,238,0.08),0 0 20px rgba(34,211,238,0.05)}

table{width:100%;border-collapse:collapse;font-size:.8rem}
th{text-align:left;padding:14px 16px;color:#475569;font-weight:600;text-transform:uppercase;font-size:.68rem;letter-spacing:.1em;border-bottom:1px solid rgba(34,211,238,0.06)}
td{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.03)}
tr:hover td{background:rgba(34,211,238,0.02)}
.tag{padding:4px 12px;border-radius:99px;font-size:.7rem;font-weight:600;letter-spacing:.02em}
.tag-active{background:rgba(34,197,94,0.1);color:#22c55e;border:1px solid rgba(34,197,94,0.15);box-shadow:0 0 10px rgba(34,197,94,0.05)}
.tag-inactive{background:rgba(100,116,139,0.08);color:#64748b;border:1px solid rgba(100,116,139,0.1)}

footer{padding:28px;text-align:center;font-size:.7rem;color:#1e293b;border-top:1px solid rgba(34,211,238,0.04);position:relative;z-index:10}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#07080d}
::-webkit-scrollbar-thumb{background:rgba(34,211,238,0.15);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:rgba(34,211,238,0.25)}

::selection{background:rgba(34,211,238,0.2);color:#fff}

@media(max-width:640px){nav{padding:12px 16px;flex-wrap:wrap;gap:6px}.nav-links{flex-wrap:wrap;gap:2px}.nav-links a{padding:6px 12px;font-size:.75rem}.container{padding:16px}.section{padding:40px 16px}.section-title{font-size:1.3rem}}
</style>
</head>
<body>
<canvas id="storm-canvas"></canvas>
<nav>
  <a href="/" class="nav-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
    TradingView
  </a>
  <div class="nav-links">
    <a href="/" class="{% if request.path == '/' %}active{% endif %}">Inicio</a>
    <a href="/terminal" class="{% if request.path == '/terminal' %}active{% endif %}">Terminal</a>
    <a href="/downloads" class="{% if request.path == '/downloads' %}active{% endif %}">Descargas</a>
    <a href="/admin" class="{% if request.path == '/admin' %}active{% endif %}">Admin</a>
  </div>
</nav>
<div class="container">{% block content %}{% endblock %}</div>
<footer>TradingView Terminal Platform &mdash; Storm Edition v1.0</footer>
<script>
// ─── Lightning Storm ───
const canvas=document.getElementById("storm-canvas");
const ctx=canvas.getContext("2d");
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
resize(); window.addEventListener("resize",resize);

const bolts=[];
function randomBolt(){
  const x=Math.random()*canvas.width;
  return {x, y:0, points:[{x,y:0}], alpha:0.8+Math.random()*0.2, width:2+Math.random()*2, life:0, maxLife:8+Math.random()*12, branches:Math.floor(Math.random()*3+1), branchProb:0.3+Math.random()*0.3}
}
function addBolt(){
  if(bolts.length<5)bolts.push(randomBolt());
}
function stepBolt(b){
  const last=b.points[b.points.length-1];
  if(last.y<canvas.height+50){
    const dx=(Math.random()-0.5)*80*(1+Math.abs(last.x-canvas.width/2)/canvas.width);
    const dy=30+Math.random()*60*(1-last.y/canvas.height);
    b.points.push({x:last.x+dx, y:last.y+dy});
    if(Math.random()<b.branchProb&&b.branches>0){
      b.branches--;
      const bx=last.x+(Math.random()-0.5)*100;
      const by=last.y+20+Math.random()*40;
      b.points.push({x:bx, y:by, branch:true});
    }
  }
  b.life++;
}
function drawBolt(b){
  ctx.beginPath();
  ctx.strokeStyle=`rgba(180,220,255,${b.alpha*(1-b.life/b.maxLife)})`;
  ctx.lineWidth=b.width*(1-b.life/b.maxLife);
  ctx.shadowColor=`rgba(180,220,255,${b.alpha*0.5*(1-b.life/b.maxLife)})`;
  ctx.shadowBlur=20+Math.random()*15;
  ctx.moveTo(b.points[0].x,b.points[0].y);
  for(let i=1;i<b.points.length;i++){
    const p=b.points[i];
    ctx.lineTo(p.x,p.y);
    if(p.branch){
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(p.x,p.y);
      ctx.lineTo(p.x+(Math.random()-0.5)*60,p.y+40+Math.random()*60);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(b.points[0].x,b.points[0].y);
      for(let j=1;j<=i;j++)ctx.lineTo(b.points[j].x,b.points[j].y);
    }
  }
  ctx.stroke();
  ctx.shadowBlur=0;
}
function drawFlash(){
  if(bolts.some(b=>b.life<3)){
    ctx.fillStyle=`rgba(200,220,255,${0.03+Math.random()*0.04})`;
    ctx.fillRect(0,0,canvas.width,canvas.height);
  }
}
function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(Math.random()<0.08)addBolt();
  for(let i=bolts.length-1;i>=0;i--){
    stepBolt(bolts[i]);
    drawBolt(bolts[i]);
    if(bolts[i].life>bolts[i].maxLife)bolts.splice(i,1);
  }
  drawFlash();
  requestAnimationFrame(animate);
}
animate();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
