<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradingView Terminal</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#0a0b0f;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
    .logo{font-size:3rem;font-weight:800;background:linear-gradient(135deg,#22d3ee,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;font-family:'Helvetica Neue',sans-serif}
    .sub{font-size:.7rem;color:#64748b;letter-spacing:.25em;text-transform:uppercase;margin-bottom:40px}
    .loader{width:200px;height:3px;background:rgba(34,211,238,0.08);border-radius:99px;overflow:hidden}
    .loader-fill{height:100%;width:0%;background:linear-gradient(90deg,#0891b2,#22d3ee);border-radius:99px;animation:load 2.5s ease forwards}
    @keyframes load{0%{width:0%}70%{width:70%}100%{width:100%}}
    .status{font-size:.68rem;color:#64748b;margin-top:12px;letter-spacing:.12em;font-family:'SF Mono','Courier New',monospace}
    .dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:#22d3ee;margin:0 3px;animation:dotPulse 1.2s ease-in-out infinite}
    .dot:nth-child(2){animation-delay:0.2s}
    .dot:nth-child(3){animation-delay:0.4s}
    @keyframes dotPulse{0%,100%{opacity:0.2;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
    .footer{position:fixed;bottom:24px;font-size:.55rem;color:#1e293b;letter-spacing:.15em}
  </style>
</head>
<body>
  <div class="logo">TRADINGVIEW</div>
  <div class="sub">Terminal Profesional</div>
  <div class="loader"><div class="loader-fill"></div></div>
  <div class="status" id="status">Conectando<span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
  <div class="footer">TradingView Terminal v1.0</div>
  <script>
    var baseUrl = "https://tradingview.onrender.com";
    setTimeout(function(){
      document.getElementById("status").textContent = "Cargando terminal...";
      setTimeout(function(){
        window.location.replace(baseUrl + "/terminal");
      }, 1200);
    }, 2000);
  </script>
</body>
</html>
